# requiring the environment of Ruby 2.3.x
image: ruby:2.3

# Set to production
variables:
  JEKYLL_ENV: production

# add cache to 'vendor' for speeding up builds
cache:
  paths: 
    - vendor/

before_script:
  - bundle install --path vendor

# add a job called 'test'
test:
  stage: test
  script:
    - bundle exec jekyll build --watch --incremental --verbose -d test/
  artifacts:
    paths:
      - test # generating site folder to be browsed or download
  except:
    - master # the 'test' job will affect all branches expect 'master'

# the 'pages' job will deploy and build your site to the 'public' path
pages:
  stage: deploy
  script:
    - bundle exec jekyll build  --watch --incremental --verbose -d public/
#    - mkdir -p public/.well-known/acme-challenge/ # Add Let's Encrypt support
#    - cp le/*  public/.well-known/acme-challenge/ # Copy Let's Encrypt support
  artifacts:
    paths:
      - public
  only:
    - master # this job will affect only the 'master' branch
